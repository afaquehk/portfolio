<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <pattern id="paperPattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M0 12L12 0L24 12L12 24Z" stroke="#ece7df" stroke-width="0.8" fill="none"/>
      <path d="M12 0V24M0 12H24" stroke="#f3efe9" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="frame" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cf6a2d"/>
      <stop offset="0.5" stop-color="#7d201d"/>
      <stop offset="1" stop-color="#d58b42"/>
    </linearGradient>
    <linearGradient id="badgeMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bcc4d0"/>
      <stop offset="0.5" stop-color="#70798a"/>
      <stop offset="1" stop-color="#d8dee8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="#d9d8d1"/>
  <rect x="12" y="12" width="776" height="426" rx="24" fill="url(#frame)"/>
  <rect x="26" y="18" width="748" height="414" rx="22" fill="#f4f1ea"/>
  <rect x="34" y="24" width="732" height="402" rx="20" fill="#faf8f4" filter="url(#shadow)"/>
  <rect x="34" y="24" width="732" height="402" rx="20" fill="url(#paperPattern)" opacity="0.78"/>

  <text x="72" y="76" fill="#d94830" font-family="Arial, sans-serif" font-size="24" font-weight="700">ORACLE</text>
  <text x="72" y="98" fill="#333333" font-family="Arial, sans-serif" font-size="14">University</text>

  <g transform="translate(608 34)">
    <circle cx="56" cy="40" r="44" fill="url(#badgeMetal)"/>
    <circle cx="56" cy="40" r="34" fill="#fffdf9" stroke="#d8aa45" stroke-width="5"/>
    <circle cx="56" cy="40" r="25" fill="#fffaf2" stroke="#ead6a4" stroke-width="1.5"/>
    <rect x="20" y="77" width="14" height="26" fill="#cf9738"/>
    <rect x="78" y="77" width="14" height="26" fill="#cf9738"/>
    <text x="56" y="30" text-anchor="middle" fill="#d94830" font-family="Arial, sans-serif" font-size="11" font-weight="700">ORACLE</text>
    <text x="56" y="43" text-anchor="middle" fill="#444444" font-family="Arial, sans-serif" font-size="10">Certified</text>
    <text x="56" y="58" text-anchor="middle" fill="#222222" font-family="Arial, sans-serif" font-size="12" font-weight="700">Professional</text>
  </g>

  <text x="72" y="152" fill="#1f1f1f" font-family="Georgia, serif" font-size="34">Oracle Certified Professional</text>
  <text x="72" y="188" fill="#2b2b2b" font-family="Georgia, serif" font-size="23">Certificate of Recognition</text>

  <text x="72" y="248" fill="#2a2a2a" font-family="Arial, sans-serif" font-size="18">Afaque Hayat Khan</text>
  <text x="72" y="280" fill="#2a2a2a" font-family="Arial, sans-serif" font-size="16">Oracle Cloud Infrastructure 2025 Certified Data Science Professional</text>
  <circle cx="406" cy="287" r="2.5" fill="#d82e2f"/>
  <text x="72" y="324" fill="#333333" font-family="Arial, sans-serif" font-size="16">This certifies that the above named is recognized by Oracle Corporation as Oracle Certified.</text>

  <text x="72" y="384" fill="#2b2b2b" font-family="Arial, sans-serif" font-size="16">September 30, 2025</text>
  <text x="72" y="414" fill="#666666" font-family="Arial, sans-serif" font-size="14">Date</text>

  <path d="M380 355C393 333 404 397 417 345C425 317 438 390 449 349" stroke="#1f1f1f" stroke-width="2.2" fill="none"/>
  <text x="382" y="408" fill="#444444" font-family="Arial, sans-serif" font-size="14">Damien Carey</text>
  <text x="382" y="430" fill="#555555" font-family="Arial, sans-serif" font-size="12">Senior Vice President, Oracle University</text>

  <text x="72" y="446" fill="#333333" font-family="Arial, sans-serif" font-size="0">.</text>
  <text x="72" y="448" fill="#333333" font-family="Arial, sans-serif" font-size="14">This eCertificate is valid until September 30, 2027</text>

  <rect x="664" y="390" width="34" height="30" fill="#d94830"/>
  <rect x="673" y="399" width="16" height="12" rx="6" stroke="#ffffff" stroke-width="3"/>
  <text x="628" y="438" fill="#7b5842" font-family="Arial, sans-serif" font-size="9">102789028OCI25DSOCP</text>
</svg>
